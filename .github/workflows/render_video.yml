name: Render Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'The UUID of the job to compile and render'
        required: true
      supabase_url:
        required: true
      supabase_key:
        required: true
      telegram_bot_token:
        required: true
      telegram_chat_id:
        required: true
      gemini_api_key:
        required: true
      youtube_client_id:
        required: true
      youtube_client_secret:
        required: true
      youtube_refresh_token:
        required: true
      github_pat:
        required: true
      github_repo_owner:
        required: true
      github_repo_name:
        required: true
      pexels_api_key:
        required: false

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install Fonts
        run: |
          sudo apt-get install -y fonts-open-sans wget fontconfig
          sudo mkdir -p /usr/share/fonts/truetype/montserrat
          sudo wget -q "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Bold.ttf" -O /usr/share/fonts/truetype/montserrat/Montserrat-Bold.ttf
          fc-cache -f -v

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run FFmpeg Render Pipeline
        env:
          SUPABASE_URL: ${{ inputs.supabase_url }}
          SUPABASE_KEY: ${{ inputs.supabase_key }}
          TELEGRAM_BOT_TOKEN: ${{ inputs.telegram_bot_token }}
          TELEGRAM_CHAT_ID: ${{ inputs.telegram_chat_id }}
          GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
          YOUTUBE_CLIENT_ID: ${{ inputs.youtube_client_id }}
          YOUTUBE_CLIENT_SECRET: ${{ inputs.youtube_client_secret }}
          YOUTUBE_REFRESH_TOKEN: ${{ inputs.youtube_refresh_token }}
          GITHUB_PAT: ${{ inputs.github_pat }}
          GITHUB_REPO_OWNER: ${{ inputs.github_repo_owner }}
          GITHUB_REPO_NAME: ${{ inputs.github_repo_name }}
          PEXELS_API_KEY: ${{ inputs.pexels_api_key || secrets.PEXELS_API_KEY }}
          JOB_ID: ${{ inputs.job_id }}
        run: python video_renderer.py --job_id $JOB_ID

      - name: Upload Output Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final_video
          path: output/final_video.mp4
          retention-days: 1
