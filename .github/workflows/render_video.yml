name: Render Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'The UUID of the job to compile and render'
        required: true

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install Fonts
        run: |
          sudo apt-get install -y fonts-open-sans wget fontconfig
          sudo mkdir -p /usr/share/fonts/truetype/montserrat
          sudo wget -q "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Bold.ttf" -O /usr/share/fonts/truetype/montserrat/Montserrat-Bold.ttf
          fc-cache -f -v

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run FFmpeg Render Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
          JOB_ID: ${{ inputs.job_id }}
        run: python video_renderer.py --job_id $JOB_ID

      - name: Upload Output Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final_video
          path: output/final_video.mp4
          retention-days: 1
